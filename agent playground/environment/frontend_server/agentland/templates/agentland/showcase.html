{% load static %}
<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AgentLand</title><style>
*{box-sizing:border-box}body{margin:0;background:#071224;overflow:hidden}.stage{position:relative;width:100vw;height:100vh;display:grid;place-items:center}.art{width:min(100vw,177.78vh);height:min(56.25vw,100vh);object-fit:contain}.launch{position:absolute;border:0;background:transparent;cursor:pointer}.landing .enter{left:35%;top:50%;width:180px;height:62px}.landing .prompt{left:28%;bottom:5%;width:440px;height:64px}.hint{position:absolute;top:12px;right:14px;background:#081c3ad9;color:#9ffaff;border:1px solid #56c1e3;border-radius:6px;padding:8px 11px;font:12px ui-monospace}.agent{position:absolute;z-index:2;width:46px;height:58px;background-repeat:no-repeat;background-size:240px 300px;background-position:center 16%;transition:left 1.2s ease,top 1.2s ease;filter:drop-shadow(0 3px 3px #000)}.agent:after{content:attr(data-name);position:absolute;top:-17px;left:50%;transform:translateX(-50%);white-space:nowrap;background:#0b2140e8;color:#fff;padding:2px 5px;border:1px solid #75dfff;font:10px ui-monospace}.bubble{position:absolute;right:3%;bottom:12%;width:28%;min-height:66px;padding:9px 12px;color:#e8fbff;background:#0b2b50dc;border:2px solid #4b9ccc;border-radius:8px;font:12px ui-monospace;line-height:1.4;z-index:3}.controls{position:absolute;left:2%;bottom:2%;display:flex;gap:6px;z-index:4}.controls button{background:#132f54e8;color:#fff;border:1px solid #75b7e8;border-radius:5px;padding:7px 10px;cursor:pointer;font-weight:bold}@media(max-width:900px){.bubble{width:34%;font-size:10px}.agent{transform:scale(.7)}}
</style></head><body><main class="stage {{ screen }}"><img class="art" src="/agentland/showcase-art/{{ screen }}/" alt="AgentLand"><span class="hint">{% if screen == 'world' %}DEMO MODE · SIMULATION{% else %}START A MISSION{% endif %}</span>{% if screen == 'landing' %}<button class="launch enter" aria-label="Enter AgentLand" onclick="location.href='/agentland/demo/'"></button><button class="launch prompt" aria-label="Send mission" onclick="location.href='/agentland/demo/'"></button>{% else %}<div class="agent" id="planner" data-name="Planner" style="background-image:url('{% static "al/characters/Ayesha_Khan.png" %}')"></div><div class="agent" id="builder" data-name="Builder" style="background-image:url('{% static "al/characters/Arthur_Burton.png" %}')"></div><div class="agent" id="tester" data-name="Tester" style="background-image:url('{% static "al/characters/Mei_Lin.png" %}')"></div><div class="bubble" id="bubble">Planner: mission received. Assigning Builder.</div><div class="controls"><button id="pause">Pause</button><button id="restart">Restart</button></div>{% endif %}</main>{% if screen == 'world' %}<script>const a={planner:document.getElementById('planner'),builder:document.getElementById('builder'),tester:document.getElementById('tester')},b=document.getElementById('bubble');let n=0,paused=false,t;const s=[[[20,25],[30,44],[30,54],'Planner: bounded tasks assigned.'],[[24,27],[44,31],[30,54],'Builder: walking to Code Factory.'],[[24,27],[44,31],[54,61],'Tester: moving to verification.'],[[24,27],[44,31],[54,61],'Tester: fixed test passed.'],[[24,27],[70,27],[54,61],'Builder: deploying verified artifact.'],[[24,27],[70,27],[70,66],'Monitor: deployment live.']];function go(){let q=s[n++%s.length];['planner','builder','tester'].forEach((x,i)=>{a[x].style.left=q[i][0]+'%';a[x].style.top=q[i][1]+'%'});b.textContent=q[3]}function run(){clearInterval(t);go();t=setInterval(()=>!paused&&go(),2500)}document.getElementById('pause').onclick=()=>{paused=!paused;document.getElementById('pause').textContent=paused?'Resume':'Pause'};document.getElementById('restart').onclick=()=>{n=0;run()};run();</script>{% endif %}</body></html>
