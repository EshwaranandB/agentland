{% load static %}
<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AgentLand Demo Mode</title><style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#081629;color:#f7f4df;font-family:ui-monospace,Consolas,monospace}.hud{height:70px;background:linear-gradient(#173d64,#07182f);border-bottom:3px solid #c99532;display:flex;align-items:center;gap:18px;padding:8px 22px;box-shadow:0 3px 14px #0008;position:relative;z-index:4}.logo{font:900 29px Georgia,serif;letter-spacing:2px;color:#ffd66a;text-shadow:2px 2px #7a4318,-2px -2px #19284c}.pill{background:#0a1830;border:1px solid #4d8eba;border-radius:7px;padding:10px 14px;color:#d8efff}.pill b{color:#70f1ff}.demo{margin-left:auto;background:#f2bd43;color:#14233c;border-radius:5px;padding:9px 12px;font-weight:bold}.layout{display:grid;grid-template-columns:minmax(580px,1.9fr) minmax(340px,.8fr);min-height:calc(100vh - 130px)}.world{position:relative;overflow:hidden;background:#307747 url('{% static "al/the_ville/visuals/the_ville2.png" %}') center/cover}.world:after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 60%,#061426aa);pointer-events:none}.base{position:absolute;inset:8% 7% 13%;display:grid;grid-template-columns:1fr 1.25fr 1fr;grid-template-rows:1fr 1fr;gap:12px;z-index:1}.building{position:relative;border:4px solid #c4a065;border-radius:7px;background:linear-gradient(145deg,#544837,#182a38);box-shadow:inset 0 0 0 3px #2b1f20,0 7px 18px #0009;overflow:hidden;transition:.35s}.building:before{content:attr(data-title);position:absolute;z-index:3;top:9px;left:50%;transform:translateX(-50%);white-space:nowrap;background:#111c2b;border:2px solid #d2a143;color:#fff8d4;padding:5px 10px;border-radius:4px;font-weight:bold;font-size:12px}.building.active{box-shadow:inset 0 0 40px #4ee9ff,0 0 25px #56e5ff}.building.success{box-shadow:inset 0 0 40px #9eff5a,0 0 25px #a4ff64}.building.monitoring{box-shadow:inset 0 0 40px #bd78ff,0 0 25px #bf7cff}.building .screens{position:absolute;inset:35% 18% 20%;background:repeating-linear-gradient(0deg,#1e7b8d 0 4px,#0b2434 5px 9px);border:2px solid #6bbfd3;opacity:.75}.town{grid-column:1}.factory{grid-column:2}.deploy{grid-column:3}.research{grid-column:1;grid-row:2}.testing{grid-column:2;grid-row:2}.support{grid-column:3;grid-row:2}.agent{position:absolute;z-index:3;width:42px;height:42px;border-radius:12px;border:3px solid #dbeaff;background:radial-gradient(circle at 50% 40%,#77faff 0 16%,#1d5a86 18% 39%,#121f3a 41%);box-shadow:0 0 14px currentColor;transition:left 1.1s ease,top 1.1s ease,filter .2s;display:grid;place-items:end center;padding-bottom:43px;color:#fff;text-shadow:1px 1px #000;font-size:11px;font-weight:bold;white-space:nowrap}.agent:after{content:"";position:absolute;width:13px;height:7px;border-radius:6px;background:#71f9ff;top:12px}.agent.work{filter:brightness(1.45);animation:bob .7s infinite alternate}.bubble{position:absolute;z-index:3;bottom:17px;left:24px;background:#12294aee;border:2px solid #6dcff6;border-radius:8px;padding:8px 10px;max-width:250px;font-size:12px;color:#e9fbff;opacity:0;transition:.25s}.bubble.show{opacity:1}@keyframes bob{to{transform:translateY(-7px)}}.ops{background:linear-gradient(#0b2342,#07162b);border-left:4px solid #c7953b;padding:14px;display:flex;flex-direction:column;min-height:0}.ops-head{font-size:20px;font-weight:bold;border-bottom:1px solid #416889;padding:5px 4px 12px}.objective{margin:12px 0;padding:12px;background:#114a92;border:2px solid #4b92e9;border-radius:8px;font-size:13px}.feed{overflow:auto;flex:1;padding-right:5px}.entry{margin:10px 0;padding:10px 12px;border-left:5px solid #55c9ff;background:#102e51;border-radius:7px;font-size:13px;animation:arrive .35s}.entry .who{font-weight:bold;color:#7dedff;margin-bottom:4px}.entry.builder{border-color:#65e596}.entry.builder .who{color:#75f7a8}.entry.tester{border-color:#d184ff}.entry.tester .who{color:#de9dff}.entry.deploy{border-color:#ffc84c}.entry.deploy .who{color:#ffda70}.entry.monitor{border-color:#58d4f3}.entry.monitor .who{color:#67e0ff}@keyframes arrive{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}.controls{display:flex;gap:8px;margin-top:10px}.controls button,.nav button{background:#163a62;border:1px solid #78a8d3;color:#fff;border-radius:6px;padding:9px;cursor:pointer;font-weight:bold}.controls button:hover{background:#266497}.nav{height:60px;background:#06142a;border-top:3px solid #b78530;display:flex;justify-content:center;gap:10px;padding:9px}.nav button{min-width:100px}.status{font-size:11px;color:#9defff;margin-top:6px}@media(max-width:900px){.layout{grid-template-columns:1fr}.world{min-height:600px}.ops{min-height:440px}.hud .pill{display:none}}@media(max-width:580px){.base{inset:5%;gap:6px}.building:before{font-size:9px;padding:3px}.agent{transform:scale(.75)}.logo{font-size:22px}.nav button{min-width:0;font-size:10px}}
</style></head><body><header class="hud"><div class="logo">AGENTLAND</div><span class="pill">✦ <b>1,250</b></span><span class="pill">◉ <b>8,420</b></span><span class="pill">⚡ <b>120/120</b></span><span class="pill">LV. <b>12</b></span><span class="demo">DEMO MODE · SIMULATION ACTIVE</span></header><main class="layout"><section class="world"><div class="base"><div class="building town" data-title="Town Hall / Planner"><div class="screens"></div></div><div class="building factory" data-title="Code Factory"><div class="screens"></div></div><div class="building deploy" data-title="Deployment Tower"><div class="screens"></div></div><div class="building research" data-title="Research Desk"><div class="screens"></div></div><div class="building testing" data-title="Testing Facility"><div class="screens"></div></div><div class="building support" data-title="Support Hub"><div class="screens"></div></div></div><div id="bubble" class="bubble"></div><div class="agent" id="planner">Planner</div><div class="agent" id="researcher">Research</div><div class="agent" id="builder">Builder</div><div class="agent" id="tester">Tester</div><div class="agent" id="deploy-agent">Deploy</div><div class="agent" id="monitor">Monitor</div></section><aside class="ops"><div class="ops-head"># operations <span style="float:right">◉ 6</span></div><div class="objective"><b>MISSION</b><br>Build a collaborative whiteboard with isolated rooms and deploy it.</div><div id="feed" class="feed"></div><div class="controls"><button id="pause">Pause</button><button id="restart">Restart demo</button><button id="next">Next stage</button></div><div id="stage" class="status">Preparing simulation…</div></aside></main><nav class="nav"><button>🤖 Agents</button><button>📋 Tasks</button><button>🎒 Inventory</button><button>📜 Quests</button><button>✦ Shop</button><button>♛ Rank: Silver I</button></nav><script>
const $=id=>document.getElementById(id),pos={town:[28,25],research:[24,66],factory:[51,28],testing:[52,67],deploy:[78,28],support:[79,67]},agents={planner:'town',researcher:'town',builder:'town',tester:'town','deploy-agent':'town',monitor:'town'};let i=0,paused=false,timer=null;const stages=[
{name:'Mission received',agent:'planner',to:'town',building:'town',who:'You',text:'Build a collaborative whiteboard with isolated rooms and deploy it.'},
{name:'Planning',agent:'planner',to:'town',building:'town',who:'Planner Agent',text:'Breaking it down: room model, drawing isolation, verification, deploy.',work:true},
{name:'Research',agent:'researcher',to:'research',building:'research',who:'Research Agent',text:'Reviewed the workspace. The existing room route can be reused.',work:true},
{name:'Implementation',agent:'builder',to:'factory',building:'factory',who:'Coder Agent',text:'Implementation started. Repairing room-scoped stroke filtering.',work:true},
{name:'Testing',agent:'tester',to:'testing',building:'testing',who:'Tester Agent',text:'Running fixed room-isolation checks… all checks passed.',work:true},
{name:'Deployment',agent:'deploy-agent',to:'deploy',building:'deploy',who:'Deploy Agent',text:'Deploying verified artifact… feature is live.',work:true},
{name:'Monitoring',agent:'monitor',to:'support',building:'support',who:'Monitor Agent',text:'Monitoring live metrics. All systems normal.',work:true},
{name:'Completed',agent:'planner',to:'town',building:'town',who:'AgentLand',text:'Workflow completed. Every stage in this view is a deterministic demo simulation.'}
];function move(id,to,work){const el=$(id),p=pos[to];el.style.left=p[0]+'%';el.style.top=p[1]+'%';el.classList.toggle('work',!!work)}function add(s){const e=document.createElement('div');e.className='entry '+(s.agent==='builder'?'builder':s.agent==='tester'?'tester':s.agent==='deploy-agent'?'deploy':s.agent==='monitor'?'monitor':'');e.innerHTML='<div class="who">'+s.who+'</div>'+s.text;$('feed').append(e);$('feed').scrollTop=$('feed').scrollHeight}function activate(s){document.querySelectorAll('.building').forEach(b=>b.className=b.className.replace(/ active| success| monitoring/g,''));const b=document.querySelector('.'+s.building);if(b)b.classList.add(s.name==='Monitoring'?'monitoring':s.name==='Completed'?'success':'active');move(s.agent,s.to,s.work);$('bubble').textContent=s.who+': '+s.text;$('bubble').classList.add('show');setTimeout(()=>$('bubble').classList.remove('show'),2200);add(s);$('stage').textContent='Stage '+(i+1)+' / '+stages.length+' · '+s.name}function step(){if(paused)return;if(i>=stages.length){clearInterval(timer);timer=null;return}activate(stages[i++])}function restart(){clearInterval(timer);i=0;$('feed').replaceChildren();Object.keys(agents).forEach(a=>move(a,'town',false));timer=setInterval(step,2800);step()}$('pause').onclick=()=>{paused=!paused;$('pause').textContent=paused?'Resume':'Pause'};$('restart').onclick=restart;$('next').onclick=()=>{if(i<stages.length)activate(stages[i++])};restart();
</script><script>
// The simulation uses the copied AgentLand character art, rather than generic dots.
const demoAvatars={planner:'Ayesha_Khan',researcher:'Abigail_Chen',builder:'Arthur_Burton',tester:'Mei_Lin','deploy-agent':'Ryan_Park',monitor:'Klaus_Mueller'};
Object.entries(demoAvatars).forEach(([id,name])=>{const el=document.getElementById(id);el.style.backgroundImage=`url('{% static "al/characters/" %}${name}.png')`;el.style.backgroundSize='220px 280px';el.style.backgroundPosition='center 20%';el.style.backgroundColor='#142443';});
</script></body></html>
