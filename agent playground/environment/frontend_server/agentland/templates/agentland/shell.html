<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AgentLand</title><style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;overflow:hidden;background:linear-gradient(#2678d5 0 55%,#67bd57 56% 100%);font-family:ui-monospace,Consolas,monospace;color:#fff}.scene:before{content:"";position:fixed;inset:42% 0 0;background:repeating-linear-gradient(90deg,#358b49 0 90px,#56aa54 92px 170px);clip-path:polygon(0 27%,15% 12%,26% 24%,41% 4%,52% 18%,68% 2%,79% 21%,100% 8%,100% 100%,0 100%);opacity:.45}.screen{position:relative;z-index:1;max-width:1180px;min-height:100vh;margin:auto;padding:38px 54px;display:grid;grid-template-columns:1fr 430px;align-content:center;gap:65px}.title{align-self:center;text-align:center;font:900 clamp(55px,9vw,114px) Georgia,serif;letter-spacing:-5px;color:#f9c64c;text-shadow:4px 4px 0 #7d431e,-4px -4px 0 #15244a,0 0 14px #fff}.robot{font-size:56px;display:block;letter-spacing:0;margin-bottom:4px}.menu{margin:42px auto 0;width:300px;text-align:left}.menu button{display:block;width:100%;border:0;background:transparent;color:#fff;font:900 28px Georgia,serif;text-shadow:3px 3px #17223b;padding:12px 10px;text-align:left;cursor:pointer}.menu button:first-child{color:#ffd65d}.menu button:hover{transform:translateX(10px)}.chat{align-self:center;background:linear-gradient(145deg,#162f61,#07152d);border:5px solid #c28b3d;box-shadow:inset 0 0 0 3px #345d99,0 13px 26px #0008;border-radius:12px;padding:18px;min-height:340px}.chat h2{margin:0 0 15px;font-size:17px;color:#80e8ff}.bubble{border:2px solid #518ce2;border-radius:8px;background:#164f9e;margin:10px 0;padding:12px;line-height:1.45}.bubble.agent{background:#17705e;border-color:#48d7b0}.prompt{position:absolute;left:50%;bottom:30px;transform:translateX(-50%);width:min(700px,88vw);display:flex;background:#071632;border:4px solid #c8913b;border-radius:12px;box-shadow:0 6px 0 #15234a}.prompt input{flex:1;background:transparent;border:0;color:#fff;padding:16px;font:16px ui-monospace;outline:none}.prompt button{border:0;background:#2a79d7;color:white;font-size:24px;width:70px;cursor:pointer}@media(max-width:850px){.screen{grid-template-columns:1fr;padding:35px 20px;gap:15px}.title{font-size:72px}.menu{margin:15px auto}.chat{display:none}.prompt{bottom:18px}}
</style></head><body><main class="scene"><section class="screen"><section><h1 class="title"><span class="robot">🤖</span>AGENTLAND</h1><nav class="menu"><button id="enter">⚔ ENTER ›</button><button>🤖 AGENTS</button><button id="settings">⚙ SETTINGS</button></nav></section><aside class="chat"><h2>✦ AgentLand command channel</h2><div class="bubble">Build my world: collaborative whiteboard with isolated rooms.</div><div class="bubble agent">Done — your agents are ready.</div><div class="bubble">Need anything else?</div></aside></section><form class="prompt" id="prompt"><input id="mission" value="Build a collaborative whiteboard with isolated rooms" aria-label="Talk to AgentLand"><button>➤</button></form></main><script>const launch=event=>{if(event)event.preventDefault();location.href='/agentland/demo/'};document.getElementById('enter').onclick=launch;document.getElementById('prompt').onsubmit=launch;document.getElementById('settings').onclick=()=>alert('OpenAI key settings are available from the normal product workflow. Demo Mode is a visual simulation.');</script></body></html>
